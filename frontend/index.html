<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrOCR - Intelligent Text Extraction</title>
    <!-- Use modern Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide icons for aesthetics -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="glass-container">
        <header>
            <h1 class="gradient-text">Intelligent OCR</h1>
            <p>Upload a clear image of text to instantly extract it via fine-tuned TrOCR model.</p>
        </header>

        <section class="upload-section">
            <div id="dropzone" class="dropzone">
                <i data-lucide="image-plus" class="upload-icon"></i>
                <h2>Drag & Drop your image</h2>
                <p>or click to browse from your device</p>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </div>
            
            <div id="previewContainer" class="preview-container hidden">
                <div class="preview-card">
                    <img id="imagePreview" alt="Image Preview">
                    <button id="clearBtn" class="action-btn secondary-btn" aria-label="Clear Selection">
                        <i data-lucide="x"></i> Clear
                    </button>
                </div>
            </div>
        </section>

        <div class="actions">
            <button id="extractBtn" class="primary-btn" disabled>
                <i data-lucide="wand-2"></i> Extract Text
            </button>
        </div>

        <section id="resultSection" class="result-section hidden">
            <div class="result-header">
                <h3>Extraction Result</h3>
                <button id="copyBtn" class="icon-btn" title="Copy to clipboard">
                    <i data-lucide="copy"></i>
                </button>
            </div>
            <div class="result-content">
                <div id="loader" class="loader hidden">
                    <div class="spinner"></div>
                    <p>Processing image with TrOCR...</p>
                </div>
                <div id="errorBox" class="error-message hidden"></div>
                <textarea id="extractedText" class="extracted-text hidden" readonly placeholder="Parsed text will appear here..."></textarea>
            </div>
        </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
